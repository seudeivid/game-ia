<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS 3D - Missão Cristal</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .stats {
            display: flex; justify-content: space-between; padding: 20px 40px;
            color: #fff; font-size: 22px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .objective { color: #00ffff; text-shadow: 0 0 10px rgba(0, 255, 255, 0.8); font-size: 26px; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background-color: rgba(255, 255, 255, 0.8); box-shadow: 0 0 2px rgba(0,0,0,0.5); }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        #menu-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; z-index: 10;
        }

        h1 { font-size: 54px; margin-bottom: 10px; color: #00ffff; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 255, 255, 0.5); }
        p { font-size: 18px; margin-bottom: 30px; color: #ddd; text-align: center; line-height: 1.6; max-width: 600px; }
        
        button {
            padding: 15px 40px; font-size: 20px; font-weight: bold; background-color: #00ffff; color: #000;
            border: 2px solid #fff; border-radius: 5px; cursor: pointer; transition: all 0.2s; pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        button:hover { background-color: #fff; transform: scale(1.05); }

        .hidden { display: none !important; }

        #damage-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0.4); pointer-events: none;
            opacity: 0; transition: opacity 0.1s; box-shadow: inset 0 0 100px rgba(255,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="hud">
        <div class="stats">
            <div>❤️ Vida: <span id="health-display">100</span></div>
            <div class="objective">💎 Cristais: <span id="artifact-display">0/5</span></div>
            <div>🔫 Arma: <span id="weapon-display">Pistola (1)</span></div>
        </div>
        <div id="crosshair"></div>
    </div>

    <div id="damage-overlay"></div>

    <div id="menu-screen">
        <h1 id="menu-title">Operação Resgate</h1>
        <p>
            <b>OBJETIVO:</b> Encontre e colete os <b>5 Cristais de Energia</b> espalhados pelo mapa para vencer. Use as caixas como cobertura!<br><br>
            <b>W A S D</b> - Mover | <b>Espaço</b> - Pular<br>
            <b>Mouse</b> - Mirar/Atirar | <b>1 / 2</b> - Trocar Arma
        </p>
        <button id="start-btn">Iniciar Missão</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let camera, scene, renderer, controls;
        let prevTime = performance.now();
        let velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;

        let bullets = [], enemyBullets = [], enemies = [];
        let boxesMeshes = [], boxesBox3 = []; // Arrays para Colisão
        let artifacts = [];
        
        const TOTAL_ARTIFACTS = 5;
        let artifactsCollected = 0;
        let health = 100;
        let isGameOver = false;
        let enemySpawnTimer = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let currentWeapon = 1, isMouseDown = false, lastShootTime = 0;
        let gunGroup1, gunGroup2;

        const weapons = {
            1: { name: 'Pistola', fireRate: 350, auto: false, damage: 1, speed: 60, color: 0xffff00 },
            2: { name: 'Fuzil', fireRate: 100, auto: true, damage: 0.5, speed: 80, color: 0xffaa00 }
        };

        const clock = new THREE.Clock();
        let grassTexture, woodTexture, pistolTexture, rifleTexture, camoTexture;

        const menuScreen = document.getElementById('menu-screen');
        const startBtn = document.getElementById('start-btn');
        const artifactDisplay = document.getElementById('artifact-display');
        const healthDisplay = document.getElementById('health-display');
        const damageOverlay = document.getElementById('damage-overlay');
        const menuTitle = document.getElementById('menu-title');
        const weaponDisplay = document.getElementById('weapon-display');

        function generateProceduralTextures() {
            const canvasGrass = document.createElement('canvas'); canvasGrass.width = 256; canvasGrass.height = 256;
            const ctxG = canvasGrass.getContext('2d'); ctxG.fillStyle = '#2b4512'; ctxG.fillRect(0, 0, 256, 256);
            for(let i=0; i<8000; i++) { ctxG.fillStyle = Math.random() > 0.5 ? '#3c6318' : '#1e330a'; ctxG.fillRect(Math.random()*256, Math.random()*256, 3, 3); }
            grassTexture = new THREE.CanvasTexture(canvasGrass); grassTexture.wrapS = grassTexture.wrapT = THREE.RepeatWrapping; grassTexture.repeat.set(50, 50);

            const canvasWood = document.createElement('canvas'); canvasWood.width = 256; canvasWood.height = 256;
            const ctxW = canvasWood.getContext('2d'); ctxW.fillStyle = '#6b4226'; ctxW.fillRect(0, 0, 256, 256);
            for(let i=0; i<256; i+=10) { ctxW.fillStyle = '#4a2e1b'; ctxW.fillRect(i, 0, 2 + Math.random()*4, 256); }
            ctxW.lineWidth = 15; ctxW.strokeStyle = '#2b180d'; ctxW.strokeRect(0,0,256,256); ctxW.beginPath(); ctxW.moveTo(0,0); ctxW.lineTo(256,256); ctxW.moveTo(256,0); ctxW.lineTo(0,256); ctxW.stroke();
            woodTexture = new THREE.CanvasTexture(canvasWood);

            const canvasPistol = document.createElement('canvas'); canvasPistol.width = 128; canvasPistol.height = 128;
            const ctxP = canvasPistol.getContext('2d'); ctxP.fillStyle = '#1a1a1a'; ctxP.fillRect(0, 0, 128, 128);
            for(let i=0; i<128; i+=4) { ctxP.fillStyle = '#2a2a2a'; ctxP.fillRect(i, 0, 2, 128); ctxP.fillRect(0, i, 128, 2); }
            pistolTexture = new THREE.CanvasTexture(canvasPistol);

            const canvasRifle = document.createElement('canvas'); canvasRifle.width = 64; canvasRifle.height = 64;
            const ctxR = canvasRifle.getContext('2d'); const colors = ['#3f4a2e', '#2c361e', '#515c3d', '#1f2416'];
            for(let x=0; x<64; x+=8) { for(let y=0; y<64; y+=8) { ctxR.fillStyle = colors[Math.floor(Math.random() * colors.length)]; ctxR.fillRect(x, y, 8, 8); } }
            rifleTexture = new THREE.CanvasTexture(canvasRifle); rifleTexture.magFilter = THREE.NearestFilter;

            const canvasCamo = document.createElement('canvas'); canvasCamo.width = 128; canvasCamo.height = 128;
            const ctxC = canvasCamo.getContext('2d'); ctxC.fillStyle = '#5c5445'; ctxC.fillRect(0,0,128,128);
            for(let i=0; i<50; i++) { ctxC.fillStyle = Math.random() > 0.5 ? '#3b352a' : '#242018'; ctxC.beginPath(); ctxC.arc(Math.random()*128, Math.random()*128, 5+Math.random()*12, 0, Math.PI*2); ctxC.fill(); }
            camoTexture = new THREE.CanvasTexture(canvasCamo);
        }

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'pistol') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'rifle') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            } else if (type === 'enemyShoot') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'pickup') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        window.onload = init;

        function init() {
            generateProceduralTextures();

            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB); scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(20, 50, 20); scene.add(dirLight);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0);

            createGun(); scene.add(camera);
            controls = new THREE.PointerLockControls(camera, document.body);

            startBtn.addEventListener('click', () => { if (isGameOver) resetGame(); controls.lock(); });
            controls.addEventListener('lock', () => { menuScreen.classList.add('hidden'); });
            controls.addEventListener('unlock', () => {
                if (!isGameOver) { menuScreen.classList.remove('hidden'); menuTitle.innerText = "Jogo Pausado"; menuTitle.style.color = "#00ffff"; startBtn.innerText = "Continuar"; }
            });

            createEnvironment();
            createArtifacts();

            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('game-container').appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown); document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', onMouseDown); document.addEventListener('mouseup', () => { isMouseDown = false; });

            animate();
        }

        function createGun() {
            gunGroup1 = new THREE.Group(); const gunMat1 = new THREE.MeshStandardMaterial({ map: pistolTexture, metalness: 0.8, roughness: 0.3 });
            const barrel1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.4), gunMat1); barrel1.position.set(0, 0, -0.2);
            const grip1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.15), gunMat1); grip1.position.set(0, -0.15, 0); grip1.rotation.x = Math.PI / 8;
            gunGroup1.add(barrel1, grip1); gunGroup1.position.set(0.3, -0.25, -0.5);

            gunGroup2 = new THREE.Group(); const gunMat2 = new THREE.MeshStandardMaterial({ map: rifleTexture, metalness: 0.3, roughness: 0.7 });
            const barrel2 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.8), gunMat2); barrel2.position.set(0, 0, -0.4);
            const grip2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.25, 0.15), gunMat1); grip2.position.set(0, -0.2, -0.1); grip2.rotation.x = Math.PI / 8;
            const stock = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.2, 0.4), gunMat2); stock.position.set(0, -0.1, 0.2);
            const sight = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.08, 0.05), new THREE.MeshBasicMaterial({color: 0xff0000})); sight.position.set(0, 0.1, -0.2);
            gunGroup2.add(barrel2, grip2, stock, sight); gunGroup2.position.set(0.3, -0.25, -0.5); gunGroup2.visible = false;

            camera.add(gunGroup1); camera.add(gunGroup2);
        }

        function createEnvironment() {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300, 10, 10).rotateX(-Math.PI / 2), new THREE.MeshStandardMaterial({ map: grassTexture, roughness: 1.0 }));
            scene.add(floor);

            const boxGeo = new THREE.BoxGeometry(4, 4, 4);
            const boxMat = new THREE.MeshStandardMaterial({ map: woodTexture, roughness: 0.9 });

            for (let i = 0; i < 70; i++) {
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set( Math.floor(Math.random() * 60 - 30) * 3, 2, Math.floor(Math.random() * 60 - 30) * 3 );
                box.rotation.y = Math.random() * Math.PI;
                if (Math.abs(box.position.x) > 6 || Math.abs(box.position.z) > 6) {
                    scene.add(box);
                    boxesMeshes.push(box);
                    // Criar Box3 (caixa delimitadora matemática) para colisão rápida
                    box.updateMatrixWorld();
                    boxesBox3.push(new THREE.Box3().setFromObject(box));
                }
            }
        }

        function createArtifacts() {
            const geo = new THREE.OctahedronGeometry(0.8, 0);
            const mat1 = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
            const mat2 = new THREE.MeshBasicMaterial({ color: 0x0055ff, transparent: true, opacity: 0.8 });
            
            for(let i=0; i < TOTAL_ARTIFACTS; i++) {
                const group = new THREE.Group();
                group.add(new THREE.Mesh(geo, mat1));
                group.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.5, 0), mat2));
                
                // Posição longe do centro
                let ax = (Math.random() > 0.5 ? 1 : -1) * (20 + Math.random() * 50);
                let az = (Math.random() > 0.5 ? 1 : -1) * (20 + Math.random() * 50);
                group.position.set(ax, 1.5, az);
                
                scene.add(group);
                artifacts.push(group);
            }
        }

        function onKeyDown(e) {
            switch(e.code) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) velocity.y += 10; canJump = false; break;
                case 'Digit1': currentWeapon = 1; gunGroup1.visible = true; gunGroup2.visible = false; weaponDisplay.innerText = "Pistola (1)"; break;
                case 'Digit2': currentWeapon = 2; gunGroup1.visible = false; gunGroup2.visible = true; weaponDisplay.innerText = "Fuzil (2)"; break;
            }
        }
        function onKeyUp(e) {
            switch(e.code) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        }

        function onMouseDown() { if (controls.isLocked && !isGameOver) { isMouseDown = true; if (!weapons[currentWeapon].auto) shoot(); } }

        function shoot() {
            const timeNow = performance.now();
            if (timeNow - lastShootTime < weapons[currentWeapon].fireRate) return;
            lastShootTime = timeNow;

            playSound(currentWeapon === 1 ? 'pistol' : 'rifle');
            const activeGun = currentWeapon === 1 ? gunGroup1 : gunGroup2;
            activeGun.position.z += 0.1; setTimeout(() => { activeGun.position.z -= 0.1; }, 50);

            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshBasicMaterial({ color: weapons[currentWeapon].color }));
            bullet.position.copy(camera.position);
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            bullet.position.add(dir.clone().multiplyScalar(1.5));

            bullets.push({ mesh: bullet, velocity: dir.multiplyScalar(weapons[currentWeapon].speed), life: 2.0, damage: weapons[currentWeapon].damage });
            scene.add(bullet);
        }

        function createHumanoid() {
            const group = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const shirtMat = new THREE.MeshStandardMaterial({ map: camoTexture, roughness: 1.0 });
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x222222 }); 

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), skinMat); head.position.y = 1.6;
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.3), shirtMat); body.position.y = 1.0;
            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.2), shirtMat); armL.position.set(-0.4, 1.05, 0);
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.2), shirtMat); armR.position.set(0.4, 1.05, 0);
            
            const enemyGun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.5), new THREE.MeshStandardMaterial({color: 0x111111}));
            enemyGun.position.set(0, -0.3, 0.2); armR.add(enemyGun);

            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), pantsMat); legL.position.set(-0.15, 0.4, 0);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 0.25), pantsMat); legR.position.set(0.15, 0.4, 0);

            group.add(head, body, armL, armR, legL, legR);
            return { group, legL, legR, armL, armR };
        }

        function spawnEnemy() {
            const npc = createHumanoid(); const enemyGroup = npc.group;
            const angle = Math.random() * Math.PI * 2; const distance = 40 + Math.random() * 20;
            enemyGroup.position.set(camera.position.x + Math.cos(angle) * distance, 0, camera.position.z + Math.sin(angle) * distance);

            enemies.push({
                mesh: enemyGroup, npcData: npc, hp: 3, speed: 3 + Math.random() * 2,
                animationTime: Math.random() * 10, lastShootTime: performance.now() + Math.random() * 1000,
                fireRate: 1500 + Math.random() * 1000
            });
            scene.add(enemyGroup);
        }

        function enemyShoot(enemy) {
            playSound('enemyShoot');
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            const origin = enemy.mesh.position.clone(); origin.y += 1.0; bullet.position.copy(origin);
            
            const target = camera.position.clone(); target.x += (Math.random() - 0.5); target.y -= 0.5; target.z += (Math.random() - 0.5);
            const dir = new THREE.Vector3().subVectors(target, origin).normalize();

            enemyBullets.push({ mesh: bullet, velocity: dir.multiplyScalar(40), life: 3.0 });
            scene.add(bullet);

            enemy.npcData.armR.rotation.x = Math.PI / 2; setTimeout(() => { if(enemy.npcData) enemy.npcData.armR.rotation.x = 0; }, 200);
        }

        function takeDamage(amount) {
            health -= amount; healthDisplay.innerText = health;
            damageOverlay.style.opacity = 1; setTimeout(() => { damageOverlay.style.opacity = 0; }, 150);
            if (health <= 0) endGame(false);
        }

        function endGame(won) {
            isGameOver = true; controls.unlock();
            if(won) {
                menuTitle.innerText = "MISSÃO CUMPRIDA!"; menuTitle.style.color = "#00ff00";
                document.querySelector('#menu-screen p').innerHTML = `Você recuperou todos os artefatos!<br>Você é um herói.`;
            } else {
                menuTitle.innerText = "VOCÊ FOI ELIMINADO"; menuTitle.style.color = "#ff0000";
                document.querySelector('#menu-screen p').innerHTML = `A missão falhou. Tente novamente.`;
            }
            startBtn.innerText = "Jogar Novamente";
            menuScreen.classList.remove('hidden');
        }

        function resetGame() {
            health = 100; artifactsCollected = 0; isGameOver = false;
            healthDisplay.innerText = health; artifactDisplay.innerText = "0/5";
            camera.position.set(0, 1.6, 0); velocity.set(0,0,0);

            enemies.forEach(e => scene.remove(e.mesh)); enemies = [];
            bullets.forEach(b => scene.remove(b.mesh)); bullets = [];
            enemyBullets.forEach(b => scene.remove(b.mesh)); enemyBullets = [];
            artifacts.forEach(a => scene.remove(a)); artifacts = [];
            createArtifacts();
        }

        // FUNÇÃO DE COLISÃO DO JOGADOR
        function checkPlayerCollision(newX, newZ) {
            const playerBox = new THREE.Box3();
            // Teste Eixo X
            playerBox.setFromCenterAndSize(new THREE.Vector3(newX, camera.position.y, camera.position.z), new THREE.Vector3(1.0, 2, 1.0));
            let colX = boxesBox3.some(box => playerBox.intersectsBox(box));
            if(colX) { velocity.x = 0; newX = camera.position.x; } // Cancela mov X
            
            // Teste Eixo Z
            playerBox.setFromCenterAndSize(new THREE.Vector3(newX, camera.position.y, newZ), new THREE.Vector3(1.0, 2, 1.0));
            let colZ = boxesBox3.some(box => playerBox.intersectsBox(box));
            if(colZ) { velocity.z = 0; newZ = camera.position.z; } // Cancela mov Z
            
            camera.position.x = newX; camera.position.z = newZ;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now(); const delta = clock.getDelta(); const physicsDelta = (time - prevTime) / 1000;

            if (controls.isLocked === true && !isGameOver) {
                if (isMouseDown && weapons[currentWeapon].auto) shoot();

                // FÍSICA DO JOGADOR
                velocity.x -= velocity.x * 10.0 * physicsDelta; velocity.z -= velocity.z * 10.0 * physicsDelta; velocity.y -= 9.8 * 5.0 * physicsDelta; 
                direction.z = Number(moveForward) - Number(moveBackward); direction.x = Number(moveRight) - Number(moveLeft); direction.normalize();

                const speed = 60.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * physicsDelta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * physicsDelta;

                // Salvar posição antiga e calcular a nova antes de aplicar para testar colisão
                const oldX = camera.position.x; const oldZ = camera.position.z;
                controls.moveRight(-velocity.x * physicsDelta); controls.moveForward(-velocity.z * physicsDelta);
                const desiredX = camera.position.x; const desiredZ = camera.position.z;
                camera.position.set(oldX, camera.position.y, oldZ); // Reseta para aplicar colisao
                
                checkPlayerCollision(desiredX, desiredZ); // Aplica movimento com colisão
                
                controls.getObject().position.y += (velocity.y * physicsDelta);
                if (controls.getObject().position.y < 1.6) { velocity.y = 0; controls.getObject().position.y = 1.6; canJump = true; }

                // ATUALIZAR OBJETIVOS (CRISTAIS)
                for(let i = artifacts.length - 1; i >= 0; i--) {
                    let art = artifacts[i];
                    art.rotation.y += delta; art.rotation.x += delta * 0.5;
                    art.position.y = 1.5 + Math.sin(time * 0.003) * 0.3; // Efeito flutuante
                    
                    if (camera.position.distanceTo(art.position) < 2) {
                        playSound('pickup');
                        scene.remove(art); artifacts.splice(i, 1);
                        artifactsCollected++; artifactDisplay.innerText = `${artifactsCollected}/5`;
                        if(artifactsCollected >= TOTAL_ARTIFACTS) endGame(true);
                    }
                }

                // BALAS DO JOGADOR
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i]; b.mesh.position.add(b.velocity.clone().multiplyScalar(delta)); b.life -= delta;
                    let hit = false;
                    
                    // Colisão com caixas
                    const bulletBox = new THREE.Box3().setFromCenterAndSize(b.mesh.position, new THREE.Vector3(0.1, 0.1, 0.1));
                    if(boxesBox3.some(box => bulletBox.intersectsBox(box))) { hit = true; }

                    // Colisão com inimigos
                    if(!hit) {
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            let e = enemies[j]; const enemyCenter = new THREE.Vector3(e.mesh.position.x, e.mesh.position.y + 1, e.mesh.position.z);
                            if (b.mesh.position.distanceTo(enemyCenter) < 1.2) { 
                                e.hp -= b.damage; hit = true;
                                e.npcData.group.children.forEach(c => { if(c.material && c.material.emissive) c.material.emissive.setHex(0xaa0000) });
                                setTimeout(() => { if(e && e.npcData && e.npcData.group) e.npcData.group.children.forEach(c => { if(c.material && c.material.emissive) c.material.emissive.setHex(0x000000) }); }, 100);
                                if (e.hp <= 0) { scene.remove(e.mesh); enemies.splice(j, 1); }
                                break;
                            }
                        }
                    }
                    if (hit || b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); }
                }

                // BALAS INIMIGAS
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    let eb = enemyBullets[i]; eb.mesh.position.add(eb.velocity.clone().multiplyScalar(delta)); eb.life -= delta;
                    let hit = false;

                    const bulletBox = new THREE.Box3().setFromCenterAndSize(eb.mesh.position, new THREE.Vector3(0.2, 0.2, 0.2));
                    if(boxesBox3.some(box => bulletBox.intersectsBox(box))) hit = true;

                    const playerCenter = camera.position.clone(); playerCenter.y -= 0.5;
                    if (!hit && eb.mesh.position.distanceTo(playerCenter) < 1.2) { takeDamage(10); hit = true; }
                    if (hit || eb.life <= 0) { scene.remove(eb.mesh); enemyBullets.splice(i, 1); }
                }

                // LÓGICA E COLISÃO DOS INIMIGOS
                enemySpawnTimer += delta; if (enemySpawnTimer > 3.0) { spawnEnemy(); enemySpawnTimer = 0; }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    let e = enemies[i]; const dist = e.mesh.position.distanceTo(camera.position);
                    e.mesh.lookAt(camera.position.x, e.mesh.position.y, camera.position.z);

                    // Sistema de visão Raycaster (Inimigo checa se tem parede na frente)
                    const origin = new THREE.Vector3(e.mesh.position.x, e.mesh.position.y + 1, e.mesh.position.z);
                    const target = camera.position.clone(); target.y -= 0.5;
                    const dir = new THREE.Vector3().subVectors(target, origin).normalize();
                    const raycaster = new THREE.Raycaster(origin, dir);
                    const intersects = raycaster.intersectObjects(boxesMeshes);
                    let canSeePlayer = true;
                    if (intersects.length > 0 && intersects[0].distance < origin.distanceTo(target)) canSeePlayer = false;

                    if (dist > 15 || !canSeePlayer) {
                        // Mover em direção ao jogador se estiver longe OU se não consegue vê-lo
                        const oldPos = e.mesh.position.clone();
                        e.mesh.translateZ(e.speed * delta);
                        
                        // Colisão do NPC com caixas
                        const eBox = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(e.mesh.position.x, e.mesh.position.y + 1, e.mesh.position.z), new THREE.Vector3(0.8, 2, 0.8));
                        if(boxesBox3.some(b => eBox.intersectsBox(b))) { e.mesh.position.copy(oldPos); /* Para de andar se bater */ }
                        else {
                            e.animationTime += delta * e.speed * 3;
                            e.npcData.legL.rotation.x = Math.sin(e.animationTime) * 0.6; e.npcData.legR.rotation.x = Math.sin(e.animationTime + Math.PI) * 0.6;
                            e.npcData.armL.rotation.x = Math.sin(e.animationTime + Math.PI) * 0.6; e.npcData.armR.rotation.x = Math.sin(e.animationTime) * 0.6;
                        }
                    } else if (canSeePlayer) {
                        // Parar e atirar
                        e.npcData.legL.rotation.x = 0; e.npcData.legR.rotation.x = 0; e.npcData.armL.rotation.x = 0; e.npcData.armR.rotation.x = Math.PI / 2.2;
                        if (time - e.lastShootTime > e.fireRate) { enemyShoot(e); e.lastShootTime = time; }
                    }
                }
            }
            prevTime = time; renderer.render(scene, camera);
        }
        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    </script>
</body>
</html>
